services:
  - type: web
    name: sentino
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn website:app --bind 0.0.0.0:$PORT
    envVars:
      - key: OG_PRIVATE_KEY
        sync: false
